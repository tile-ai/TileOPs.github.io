name: Deploy docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: tile-ai/TileOPs
          path: TileOPs
          fetch-depth: 1
          sparse-checkout: |
            docs/design
            docs/tileops-skills.md
            .claude/skills
            tileops
          sparse-checkout-cone-mode: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mkdocs-material "mkdocstrings[python]" mkdocs-include-markdown-plugin
      - run: mkdocs gh-deploy --force
