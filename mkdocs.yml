site_name: TileOPs
site_url: https://tile-ai.github.io/TileOPs.github.io/
site_description: High-performance LLM operator library built on TileLang
repo_url: https://github.com/tile-ai/TileOPs
repo_name: tile-ai/TileOPs

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  logo: assets/logo.png
  favicon: assets/logo.png
  font:
    text: Nunito
    code: Source Code Pro
  features:
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Design:
    - Overview: design/index.md
    - Architecture: design/architecture.md
    - Op Manifest: design/manifest.md
    - Op Interface Design: design/ops-design.md
    - Op Interface Reference: design/ops-design-reference.md
    - Roofline: design/roofline.md
    - Testing & Benchmarking: design/testing.md
    - Trust Model: design/trust-model.md
    - Elementwise: design/elementwise.md
  - Skills:
    - Overview: skills/index.md
    - Catalog: skills/catalog.md
    - align-op: skills/align-op.md
    - align-family: skills/align-family.md
    - audit-family: skills/audit-family.md
    - scaffold-op: skills/scaffold-op.md
    - implement-op: skills/implement-op.md
    - test-op: skills/test-op.md
    - bench-op: skills/bench-op.md
    - add-manifest: skills/add-manifest.md
    - fix-manifest: skills/fix-manifest.md
  - API Reference:
    - Elementwise: api/elementwise.md
    - Reduction: api/reduction.md
    - Normalization: api/normalization.md
    - GEMM: api/linear-algebra.md
    - Quantization: api/quantization.md
    - Attention: api/attention.md
    - FFT: api/fft.md
    - MHC: api/mhc.md
    - Top-k: api/topk.md
  - Benchmarks:
    - benchmarks/index.md
  - Performance Guides:
    - performance-guides/index.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 2

hooks:
  - hooks.py

plugins:
  - search
  - include-markdown:
      rewrite_relative_urls: false
  - mkdocstrings:
      on_error: warn
      handlers:
        python:
          paths: [TileOPs]
          options:
            docstring_style: google
            show_source: false

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tile-ai/TileOPs

copyright: Copyright &copy; 2026 tile-ai
